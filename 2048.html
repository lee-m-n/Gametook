<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 - Neon Arcade</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%239333ea' rx='20' width='100' height='100'/><text y='.9em' font-size='90' x='50%' text-anchor='middle'>🔢</text></svg>">
  <style>
    /* 2048-specific styles */
    .board-2048 {
      width: 360px;
      height: 360px;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      position: relative;
      border: 2px solid var(--border-color);
      box-shadow: 0 0 30px rgba(147, 51, 234, 0.1);
      transition: border-color 0.3s ease;
    }

    .board-2048.skill-mode {
      border-color: var(--purple-500);
      box-shadow: 0 0 40px rgba(147, 51, 234, 0.3);
    }

    .tile {
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .tile:hover {
      transform: scale(1.03);
    }

    .tile.skill-selectable {
      animation: skillPulse 1.2s ease infinite;
    }

    .tile.skill-selected {
      box-shadow: 0 0 20px 4px rgba(192, 132, 252, 0.6), inset 0 0 0 3px #c084fc;
      transform: scale(1.08);
      z-index: 10;
    }

    .tile.skill-target {
      box-shadow: 0 0 15px 2px rgba(34, 197, 94, 0.5), inset 0 0 0 3px #22c55e;
    }

    .tile.skill-invalid {
      opacity: 0.5;
    }

    @keyframes skillPulse {
      0%, 100% { box-shadow: 0 0 8px 1px rgba(147, 51, 234, 0.3); }
      50% { box-shadow: 0 0 16px 3px rgba(147, 51, 234, 0.5); }
    }

    .tile::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tile.new {
      animation: tileAppear 0.3s ease;
    }

    .tile.merged {
      animation: tileMerge 0.3s ease;
    }

    @keyframes tileAppear {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes tileMerge {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Fixed tile indicator */
    .tile-fixed {
      border: 2px solid #f59e0b !important;
      box-shadow: inset 0 0 8px rgba(245, 158, 11, 0.3), 0 0 10px rgba(245, 158, 11, 0.2) !important;
    }

    .tile-fixed::before {
      content: '🔒';
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 0.5rem;
      opacity: 0.85;
      z-index: 5;
    }

    .tile-fixed.skill-selectable {
      animation: fixedSkillPulse 1.2s ease infinite;
    }

    @keyframes fixedSkillPulse {
      0%, 100% { box-shadow: 0 0 8px 1px rgba(245, 158, 11, 0.4), inset 0 0 8px rgba(245, 158, 11, 0.3); }
      50% { box-shadow: 0 0 16px 3px rgba(245, 158, 11, 0.6), inset 0 0 12px rgba(245, 158, 11, 0.4); }
    }

    /* Tile color scheme - purple neon */
    .tile-0 { background: rgba(17, 16, 26, 0.6); }
    
    .tile-2 { 
      background: linear-gradient(135deg, #2e1065, #3b0764); 
      color: #d8b4fe; 
      font-size: 1.6rem;
      box-shadow: 0 0 10px rgba(147, 51, 234, 0.2);
    }
    .tile-4 { 
      background: linear-gradient(135deg, #3b0764, #581c87); 
      color: #c084fc; 
      font-size: 1.6rem;
      box-shadow: 0 0 12px rgba(147, 51, 234, 0.25);
    }
    .tile-8 { 
      background: linear-gradient(135deg, #581c87, #7c3aed); 
      color: #fff; 
      font-size: 1.6rem;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
    }
    .tile-16 { 
      background: linear-gradient(135deg, #7c3aed, #9333ea); 
      color: #fff; 
      font-size: 1.5rem;
      box-shadow: 0 0 18px rgba(147, 51, 234, 0.35);
    }
    .tile-32 { 
      background: linear-gradient(135deg, #9333ea, #a855f7); 
      color: #fff; 
      font-size: 1.5rem;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
    }
    .tile-64 { 
      background: linear-gradient(135deg, #a855f7, #c084fc); 
      color: #fff; 
      font-size: 1.5rem;
      box-shadow: 0 0 22px rgba(192, 132, 252, 0.45);
    }
    .tile-128 { 
      background: linear-gradient(135deg, #c084fc, #d8b4fe); 
      color: #3b0764; 
      font-size: 1.3rem;
      box-shadow: 0 0 25px rgba(200, 132, 252, 0.5);
      text-shadow: 0 0 5px rgba(59, 7, 100, 0.3);
    }
    .tile-256 { 
      background: linear-gradient(135deg, #d8b4fe, #e9d5ff); 
      color: #581c87; 
      font-size: 1.3rem;
      box-shadow: 0 0 28px rgba(216, 180, 254, 0.55);
      text-shadow: 0 0 5px rgba(88, 28, 135, 0.3);
    }
    .tile-512 { 
      background: linear-gradient(135deg, #e9d5ff, #f3e8ff); 
      color: #7c3aed; 
      font-size: 1.3rem;
      box-shadow: 0 0 30px rgba(233, 213, 255, 0.6);
      text-shadow: 0 0 5px rgba(124, 58, 237, 0.3);
    }
    .tile-1024 { 
      background: linear-gradient(135deg, #f3e8ff, #c084fc); 
      color: #581c87; 
      font-size: 1.1rem;
      box-shadow: 0 0 35px rgba(192, 132, 252, 0.65);
      text-shadow: 0 0 8px rgba(88, 28, 135, 0.4);
    }
    .tile-2048 { 
      background: linear-gradient(135deg, #c084fc, #a855f7, #9333ea); 
      color: #fff; 
      font-size: 1.1rem;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.8), 0 0 60px rgba(147, 51, 234, 0.4);
      animation: tileGlow 2s ease infinite;
    }

    .tile-super { 
      background: linear-gradient(135deg, #ff00ff, #9333ea, #00ffff); 
      background-size: 200% 200%;
      color: #fff; 
      font-size: 1rem;
      box-shadow: 0 0 45px rgba(255, 0, 255, 0.7);
      animation: gradientShift 3s ease infinite;
    }

    @keyframes tileGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.8), 0 0 60px rgba(147, 51, 234, 0.4); }
      50% { box-shadow: 0 0 50px rgba(168, 85, 247, 1), 0 0 80px rgba(147, 51, 234, 0.6); }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Skills Panel */
    .skills-panel {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .skill-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 18px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      min-width: 80px;
      position: relative;
      overflow: hidden;
    }

    .skill-btn:hover:not(:disabled) {
      border-color: var(--purple-500);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(147, 51, 234, 0.2);
    }

    .skill-btn.active {
      background: linear-gradient(135deg, var(--purple-900), var(--bg-card-hover));
      border-color: var(--purple-500);
      color: var(--text-primary);
      box-shadow: 0 0 20px rgba(147, 51, 234, 0.3);
    }

    .skill-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .skill-btn .skill-icon {
      font-size: 1.4rem;
    }

    .skill-btn .skill-name {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .skill-btn .skill-cost {
      font-size: 0.7rem;
      color: var(--purple-400);
    }

    .skill-hint {
      color: var(--purple-300);
      font-size: 0.9rem;
      margin-bottom: 12px;
      text-align: center;
      min-height: 24px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cancel-skill-btn {
      padding: 6px 14px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 1px solid var(--danger);
      color: var(--danger);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .cancel-skill-btn:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    /* Sound Toggle */
    .sound-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.2rem;
      user-select: none;
      flex-shrink: 0;
    }

    .sound-toggle:hover {
      border-color: var(--purple-500);
      color: var(--text-primary);
      box-shadow: 0 0 15px rgba(147, 51, 234, 0.2);
    }

    .sound-toggle.muted {
      opacity: 0.5;
    }

    /* Fixed tile warning */
    .fixed-warning {
      color: #f59e0b;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 8px;
      min-height: 20px;
      animation: fadeIn 0.3s ease;
    }

    /* Timer styles */
    .timer-danger { color: #ef4444; animation: timerPulse 0.8s ease infinite; }
    @keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Mobile swipe controls */
    .swipe-area {
      display: none;
      margin-top: 20px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      position: relative;
      touch-action: none;
      user-select: none;
    }

    .swipe-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-align: center;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .board-2048 {
        width: 340px;
        height: 340px;
      }
      .tile {
        font-size: 1.4rem;
      }
      .tile-128, .tile-256, .tile-512 { font-size: 1.1rem; }
      .tile-1024, .tile-2048 { font-size: 0.95rem; }
      .tile-super { font-size: 0.85rem; }
      .swipe-area {
        display: block;
      }
      .skill-btn {
        padding: 8px 12px;
        min-width: 70px;
      }
    }

    @media (max-width: 400px) {
      .board-2048 {
        width: 300px;
        height: 300px;
      }
      .tile {
        font-size: 1.2rem;
      }
      .tile-128, .tile-256, .tile-512 { font-size: 0.95rem; }
      .tile-1024, .tile-2048 { font-size: 0.85rem; }
      .tile-super { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="page-wrapper">
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="logo">
          <div class="logo-icon">🎮</div>
          <span class="logo-text">NEON ARCADE</span>
        </a>
        <a href="index.html" class="nav-back">
          <span>←</span> 返回大厅
        </a>
      </div>
    </nav>

    <main class="game-page">
      <div class="game-header">
        <h1>🔢 2048</h1>
        <p class="subtitle">滑动合并方块，合成 2048！固定方块只能用技能处理</p>
      </div>

      <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center;">
        <button class="btn btn-primary" onclick="newGame()">新游戏</button>
        <button class="btn btn-secondary" onclick="undoMove()">撤销</button>
        <button class="btn btn-secondary" onclick="toggleMode()" id="modeToggleBtn">⏱️ 挑战模式</button>
      </div>

      <div class="score-board">
        <div class="score-box">
          <div class="score-label">得分</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">最高分</div>
          <div class="score-value" id="bestScore">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">最大方块</div>
          <div class="score-value" id="maxTile">0</div>
        </div>
        <div class="score-box" id="timerBox" style="display:none">
          <div class="score-label">剩余时间</div>
          <div class="score-value" id="timer">03:00</div>
        </div>
      </div>

      <!-- Fixed tile warning -->
      <div class="fixed-warning" id="fixedWarning"></div>

      <!-- Skills Panel + Sound Toggle -->
      <div class="skill-hint" id="skillHint"></div>
      <div style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; align-items: center;">
        <div class="skills-panel" id="skillsPanel">
          <button class="skill-btn" id="skillClear" onclick="activateSkill('clear')">
            <span class="skill-icon">🧹</span>
            <span class="skill-name">清除</span>
            <span class="skill-cost">50分</span>
          </button>
          <button class="skill-btn" id="skillMove" onclick="activateSkill('move')">
            <span class="skill-icon">↗️</span>
            <span class="skill-name">移动</span>
            <span class="skill-cost">30分</span>
          </button>
          <button class="skill-btn" id="skillSwap" onclick="activateSkill('swap')">
            <span class="skill-icon">🔄</span>
            <span class="skill-name">调换</span>
            <span class="skill-cost">100分</span>
          </button>
          <button class="cancel-skill-btn" id="cancelSkillBtn" onclick="cancelSkill()" style="display:none">取消</button>
        </div>
        <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="切换音效">🔊</button>
      </div>

      <div class="game-board-container">
        <div class="board-2048" id="board"></div>
      </div>

      <div class="controls-hint">
        使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 滑动方块
      </div>

      <div class="swipe-area" id="swipeArea">
        <div class="swipe-hint">在此区域<br>滑动操作</div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        Neon Arcade - 合并相同数字，策略致胜
      </div>
    </footer>
  </div>

  <!-- Game Over Modal -->
  <div class="overlay" id="gameOverModal">
    <div class="modal">
      <h2 id="modalTitle">游戏结束</h2>
      <p id="modalMessage">没有可移动的方块了</p>
      <div class="modal-score" id="finalScore">0</div>
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="newGame()">再来一局</button>
        <a href="index.html" class="btn btn-secondary">返回大厅</a>
      </div>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script>
    (function() {
      // ==================== SoundEngine ====================
      class SoundEngine {
        constructor() {
          this.audioContext = null;
          this.enabled = localStorage.getItem('2048_soundEnabled') !== 'false';
        }

        init() {
          if (!this.audioContext) {
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (this.audioContext.state === 'suspended') {
            this.audioContext.resume();
          }
        }

        isEnabled() {
          return this.enabled;
        }

        toggle() {
          this.enabled = !this.enabled;
          localStorage.setItem('2048_soundEnabled', this.enabled);
          if (this.enabled) this.init();
          return this.enabled;
        }

        _playTone({ freq, duration, type = 'sine', volume = 0.15, freqEnd = null }) {
          if (!this.enabled || !this.audioContext) return;
          const t = this.audioContext.currentTime;
          const osc = this.audioContext.createOscillator();
          const gain = this.audioContext.createGain();

          osc.type = type;
          if (freqEnd && freqEnd !== freq) {
            osc.frequency.setValueAtTime(freq, t);
            osc.frequency.linearRampToValueAtTime(freqEnd, t + duration / 1000);
          } else {
            osc.frequency.setValueAtTime(freq, t);
          }

          gain.gain.setValueAtTime(volume, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + duration / 1000);

          osc.connect(gain);
          gain.connect(this.audioContext.destination);

          osc.start(t);
          osc.stop(t + duration / 1000 + 0.05);
        }

        playMove() {
          this.init();
          this._playTone({ freq: 300, duration: 60, volume: 0.12 });
        }

        playMerge(value) {
          this.init();
          const baseFreq = 200;
          const freq = baseFreq + Math.log2(value || 2) * 80;
          this._playTone({ freq, duration: 100, volume: 0.15, type: 'triangle' });
        }

        playSpawn() {
          this.init();
          this._playTone({ freq: 600, duration: 80, volume: 0.12, type: 'sine' });
        }

        playFixedSpawn() {
          this.init();
          const t = this.audioContext.currentTime;
          const pulseCount = 3;
          for (let i = 0; i < pulseCount; i++) {
            const osc = this.audioContext.createOscillator();
            const gain = this.audioContext.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, t + i * 0.1);
            gain.gain.setValueAtTime(0.08, t + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.08);
            osc.connect(gain);
            gain.connect(this.audioContext.destination);
            osc.start(t + i * 0.1);
            osc.stop(t + i * 0.1 + 0.1);
          }
        }

        playClear() {
          this.init();
          this._playTone({ freq: 400, freqEnd: 100, duration: 200, volume: 0.15, type: 'sawtooth' });
        }

        playMoveSkill() {
          this.init();
          this._playTone({ freq: 200, freqEnd: 400, duration: 150, volume: 0.15 });
        }

        playSwapSkill() {
          this.init();
          const t = this.audioContext.currentTime;
          // First tone: 300Hz
          const osc1 = this.audioContext.createOscillator();
          const gain1 = this.audioContext.createGain();
          osc1.type = 'sine';
          osc1.frequency.setValueAtTime(300, t);
          gain1.gain.setValueAtTime(0.12, t);
          gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc1.connect(gain1);
          gain1.connect(this.audioContext.destination);
          osc1.start(t);
          osc1.stop(t + 0.11);

          // Second tone: 500Hz
          const osc2 = this.audioContext.createOscillator();
          const gain2 = this.audioContext.createGain();
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(500, t + 0.1);
          gain2.gain.setValueAtTime(0.12, t + 0.1);
          gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          osc2.connect(gain2);
          gain2.connect(this.audioContext.destination);
          osc2.start(t + 0.1);
          osc2.stop(t + 0.21);
        }

        playWin() {
          this.init();
          const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
          const t = this.audioContext.currentTime;
          notes.forEach((freq, i) => {
            const osc = this.audioContext.createOscillator();
            const gain = this.audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t + i * 0.1);
            gain.gain.setValueAtTime(0.12, t + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
            osc.connect(gain);
            gain.connect(this.audioContext.destination);
            osc.start(t + i * 0.1);
            osc.stop(t + i * 0.1 + 0.35);
          });
        }

        playLose() {
          this.init();
          this._playTone({ freq: 200, freqEnd: 80, duration: 500, volume: 0.15, type: 'sawtooth' });
        }

        playError() {
          this.init();
          this._playTone({ freq: 150, duration: 80, volume: 0.12, type: 'square' });
        }
      }

      const sound = new SoundEngine();

      // ==================== Game State ====================
      const board = document.getElementById('board');
      const scoreEl = document.getElementById('score');
      const bestScoreEl = document.getElementById('bestScore');
      const maxTileEl = document.getElementById('maxTile');
      const modal = document.getElementById('gameOverModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalMessage = document.getElementById('modalMessage');
      const finalScoreEl = document.getElementById('finalScore');
      const skillHint = document.getElementById('skillHint');
      const cancelSkillBtn = document.getElementById('cancelSkillBtn');
      const fixedWarning = document.getElementById('fixedWarning');
      const soundToggle = document.getElementById('soundToggle');
      const modeToggleBtn = document.getElementById('modeToggleBtn');

      let grid = [];
      let fixed = []; // 2D array: true = fixed tile
      let score = 0;
      let bestScore = parseInt(localStorage.getItem('2048BestScore') || '0');
      let history = [];
      let hasWon = false;
      let isAnimating = false;
      let nextFixedThreshold = 1000; // Next score threshold to spawn a fixed tile

      // Challenge mode
      let gameMode = 'normal'; // 'normal' | 'challenge'
      let timeLeft = 180;
      let timerInterval = null;
      let bestTime = parseInt(localStorage.getItem('2048BestTime') || '99999');

      // Skills system
      const SKILLS = {
        clear: { name: '清除', cost: 50, icon: '🧹', desc: '点击一个方块将其清除（包括固定方块）' },
        move: { name: '移动', cost: 30, icon: '↗️', desc: '先点击一个方块，再点击相邻的空格移动它（包括固定方块）' },
        swap: { name: '调换', cost: 100, icon: '🔄', desc: '点击两个方块交换它们的位置（包括固定方块）' }
      };
      let activeSkill = null;   // 'clear' | 'move' | 'swap' | null
      let selectedTiles = [];   // Array of {r, c} for selected tiles

      bestScoreEl.textContent = bestScore;

      // Update sound toggle UI
      function updateSoundToggle() {
        if (sound.isEnabled()) {
          soundToggle.textContent = '🔊';
          soundToggle.classList.remove('muted');
        } else {
          soundToggle.textContent = '🔇';
          soundToggle.classList.add('muted');
        }
      }
      updateSoundToggle();

      window.toggleSound = function() {
        const enabled = sound.toggle();
        updateSoundToggle();
      };

      function updateModeButton() {
        if (gameMode === 'normal') {
          modeToggleBtn.textContent = '⏱️ 挑战模式';
        } else {
          modeToggleBtn.textContent = '🎯 普通模式';
        }
      }

      window.toggleMode = function() {
        gameMode = gameMode === 'normal' ? 'challenge' : 'normal';
        updateModeButton();
        newGame();
      };

      function startTimer() {
        timeLeft = 180;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
          timeLeft -= 0.1;
          if (timeLeft <= 0) {
            timeLeft = 0;
            clearInterval(timerInterval);
            timerInterval = null;
            sound.playLose();
            modalTitle.textContent = '时间到！';
            modalMessage.textContent = '挑战失败！未能合成 2048';
            finalScoreEl.textContent = score;
            modal.classList.add('active');
          }
          updateTimerDisplay();
        }, 100);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function updateTimerDisplay() {
        const timerEl = document.getElementById('timer');
        const timerBox = document.getElementById('timerBox');
        if (gameMode !== 'challenge') {
          timerBox.style.display = 'none';
          return;
        }
        timerBox.style.display = '';
        const minutes = Math.floor(timeLeft / 60);
        const seconds = Math.floor(timeLeft % 60);
        timerEl.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        if (timeLeft <= 30) {
          timerEl.classList.add('timer-danger');
        } else {
          timerEl.classList.remove('timer-danger');
        }
      }

      function initGrid() {
        grid = Array(4).fill(null).map(() => Array(4).fill(0));
        fixed = Array(4).fill(null).map(() => Array(4).fill(false));
        score = 0;
        hasWon = false;
        history = [];
        activeSkill = null;
        selectedTiles = [];
        nextFixedThreshold = 1000;
        scoreEl.textContent = '0';
        updateMaxTile();
        updateSkillButtons();
        fixedWarning.textContent = '';
        stopTimer(); // stop any existing timer
        addRandomTile();
        addRandomTile();
        render();
        cancelSkill();
        updateTimerDisplay(); // show/hide timer based on mode
        if (gameMode === 'challenge') startTimer();
      }

      // ========== FIXED TILE SYSTEM ==========

      // Center 4 cells: (1,1), (1,2), (2,1), (2,2)
      const CENTER_CELLS = [
        { r: 1, c: 1 }, { r: 1, c: 2 },
        { r: 2, c: 1 }, { r: 2, c: 2 }
      ];

      function getInitialTileValue() {
        let max = 0;
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] > max) max = grid[r][c];
          }
        }
        if (max >= 1024) return 32;
        if (max >= 512) return 16;
        if (max >= 256) return 8;
        if (max >= 128) return 4;
        return Math.random() < 0.9 ? 2 : 4;
      }

      function trySpawnFixedTile() {
        // Check if we've crossed a 1000-point threshold
        while (score >= nextFixedThreshold) {
          const available = CENTER_CELLS.filter(cell => grid[cell.r][cell.c] === 0);
          if (available.length > 0) {
            const cell = available[Math.floor(Math.random() * available.length)];
            grid[cell.r][cell.c] = getInitialTileValue();
            fixed[cell.r][cell.c] = true;
            sound.playFixedSpawn();
            showFixedWarning(`⚠️ 固定方块出现在 (${cell.r + 1}, ${cell.c + 1})！值为 ${grid[cell.r][cell.c]}，只能使用技能处理`);
          }
          nextFixedThreshold += 1000;
        }
      }

      function showFixedWarning(text) {
        fixedWarning.textContent = text;
        fixedWarning.style.animation = 'none';
        fixedWarning.offsetHeight; // force reflow
        fixedWarning.style.animation = 'fadeIn 0.5s ease';
        setTimeout(() => { fixedWarning.textContent = ''; }, 3000);
      }

      function addRandomTile() {
        const empty = [];
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] === 0) empty.push({ r, c });
          }
        }
        if (empty.length === 0) return false;
        const { r, c } = empty[Math.floor(Math.random() * empty.length)];
        grid[r][c] = getInitialTileValue();
        sound.playSpawn();
        return { r, c, value: grid[r][c] };
      }

      function saveState() {
        history.push({
          grid: grid.map(row => [...row]),
          fixed: fixed.map(row => [...row]),
          score: score,
          nextFixedThreshold: nextFixedThreshold
        });
        if (history.length > 10) history.shift();
      }

      function undoMove() {
        if (history.length === 0) return;
        const state = history.pop();
        grid = state.grid;
        fixed = state.fixed;
        score = state.score;
        nextFixedThreshold = state.nextFixedThreshold;
        scoreEl.textContent = score;
        updateMaxTile();
        updateSkillButtons();
        cancelSkill();
        render();
      }

      window.undoMove = undoMove;

      // ========== SKILLS ==========
      window.activateSkill = function(skillName) {
        if (activeSkill === skillName) {
          cancelSkill();
          return;
        }
        const skill = SKILLS[skillName];
        if (score < skill.cost) {
          sound.playError();
          showSkillHint(`分数不足！${skill.name}需要 ${skill.cost} 分`);
          return;
        }
        activeSkill = skillName;
        selectedTiles = [];
        document.querySelectorAll('.skill-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('skill' + skillName.charAt(0).toUpperCase() + skillName.slice(1)).classList.add('active');
        cancelSkillBtn.style.display = 'inline-block';
        showSkillHint(skill.desc + ' — 点击棋盘上的方块');
        board.classList.add('skill-mode');
        render();
      };

      window.cancelSkill = function() {
        activeSkill = null;
        selectedTiles = [];
        document.querySelectorAll('.skill-btn').forEach(btn => btn.classList.remove('active'));
        cancelSkillBtn.style.display = 'none';
        skillHint.textContent = '';
        board.classList.remove('skill-mode');
        render();
      };

      function showSkillHint(text) {
        skillHint.textContent = text;
        skillHint.style.animation = 'none';
        skillHint.offsetHeight; // force reflow
        skillHint.style.animation = 'fadeIn 0.3s ease';
      }

      function updateSkillButtons() {
        for (const [key, skill] of Object.entries(SKILLS)) {
          const btnId = 'skill' + key.charAt(0).toUpperCase() + key.slice(1);
          const btn = document.getElementById(btnId);
          if (btn) {
            btn.disabled = score < skill.cost;
          }
        }
      }

      function deductScore(cost) {
        score -= cost;
        scoreEl.textContent = score;
        updateSkillButtons();
      }

      function executeSkill(r, c) {
        if (!activeSkill) return;
        const skill = SKILLS[activeSkill];

        if (activeSkill === 'clear') {
          // 清除1格：点击任意方块（包括固定方块），清除它
          if (grid[r][c] === 0) {
            sound.playError();
            showSkillHint('请选择一个有数字的方块！');
            return;
          }
          const wasFixed = fixed[r][c];
          saveState();
          grid[r][c] = 0;
          fixed[r][c] = false;
          deductScore(skill.cost);
          sound.playClear();
          showSkillHint(`✅ ${skill.name} 成功！清除了一个${wasFixed ? '固定' : ''}方块`);
          cancelSkill();
          addRandomTile(); // 补偿一个随机方块
          render();
          checkGameState();
          return;
        }

        if (activeSkill === 'move') {
          // 移动：先选一个有数字的方块，再选相邻的空格
          if (selectedTiles.length === 0) {
            // 第一次选择：必须有数字
            if (grid[r][c] === 0) {
              sound.playError();
              showSkillHint('先选择一个有数字的方块');
              return;
            }
            selectedTiles.push({ r, c });
            showSkillHint('再点击相邻的空格来移动');
            render();
            return;
          }
          // 第二次选择：必须是相邻的空格
          const first = selectedTiles[0];
          if (grid[r][c] !== 0) {
            sound.playError();
            showSkillHint('请选择一个相邻的空格！');
            return;
          }
          const dr = Math.abs(r - first.r);
          const dc = Math.abs(c - first.c);
          if (dr + dc !== 1) {
            sound.playError();
            showSkillHint('只能移动到相邻的格子！');
            return;
          }
          saveState();
          grid[r][c] = grid[first.r][first.c];
          grid[first.r][first.c] = 0;
          // Move fixed property too
          fixed[r][c] = fixed[first.r][first.c];
          fixed[first.r][first.c] = false;
          deductScore(skill.cost);
          sound.playMoveSkill();
          showSkillHint(`✅ ${skill.name} 成功！方块已移动`);
          cancelSkill();
          render();
          checkGameState();
          return;
        }

        if (activeSkill === 'swap') {
          // 调换：点击两个方块交换位置
          if (selectedTiles.length === 0) {
            selectedTiles.push({ r, c });
            showSkillHint('再点击另一个方块来交换位置');
            render();
            return;
          }
          const first = selectedTiles[0];
          if (first.r === r && first.c === c) {
            selectedTiles = [];
            showSkillHint('已取消第一个选择，请重新选择');
            render();
            return;
          }
          saveState();
          const tempVal = grid[first.r][first.c];
          grid[first.r][first.c] = grid[r][c];
          grid[r][c] = tempVal;
          // Swap fixed property too
          const tempFixed = fixed[first.r][first.c];
          fixed[first.r][first.c] = fixed[r][c];
          fixed[r][c] = tempFixed;
          deductScore(skill.cost);
          sound.playSwapSkill();
          showSkillHint(`✅ ${skill.name} 成功！两个方块已交换`);
          cancelSkill();
          updateMaxTile();
          render();
          checkGameState();
          return;
        }
      }

      function checkGameState() {
        if (!canMove()) {
          sound.playLose();
          setTimeout(() => {
            modalTitle.textContent = '游戏结束';
            modalMessage.textContent = '没有可移动的方块了';
            finalScoreEl.textContent = score;
            modal.classList.add('active');
          }, 400);
        } else {
          checkWin();
        }
      }

      // ========== GAME LOGIC WITH FIXED TILES ==========

      // Slide a segment (between fixed tiles), return new values and score gained
      function slideSegment(values) {
        let filtered = values.filter(v => v !== 0);
        let segScore = 0;
        for (let i = 0; i < filtered.length - 1; i++) {
          if (filtered[i] === filtered[i + 1]) {
            filtered[i] *= 2;
            segScore += filtered[i];
            filtered[i + 1] = 0;
          }
        }
        filtered = filtered.filter(v => v !== 0);
        while (filtered.length < values.length) filtered.push(0);
        return { values: filtered, score: segScore };
      }

      function slideRowLeft(row, fixedRow) {
        const result = new Array(4).fill(0);
        let scoreGained = 0;
        let segStart = 0;

        for (let i = 0; i <= 4; i++) {
          if (i === 4 || fixedRow[i]) {
            // Process segment from segStart to i-1
            const segment = row.slice(segStart, i);
            const { values, score: segScore } = slideSegment(segment);
            for (let j = 0; j < values.length; j++) {
              result[segStart + j] = values[j];
            }
            scoreGained += segScore;
            // Fixed tile stays in place
            if (i < 4) result[i] = row[i];
            segStart = i + 1;
          }
        }
        return { row: result, score: scoreGained };
      }

      function moveLeft() {
        let newGrid = Array(4).fill(null).map(() => Array(4).fill(0));
        let totalScore = 0;
        let changed = false;
        for (let r = 0; r < 4; r++) {
          const { row, score } = slideRowLeft(grid[r], fixed[r]);
          newGrid[r] = row;
          totalScore += score;
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] !== row[c]) changed = true;
          }
        }
        return { grid: newGrid, score: totalScore, changed };
      }

      function moveRight() {
        let newGrid = Array(4).fill(null).map(() => Array(4).fill(0));
        let totalScore = 0;
        let changed = false;
        for (let r = 0; r < 4; r++) {
          // Reverse the row and fixed row, slide left, then reverse back
          const reversed = [...grid[r]].reverse();
          const fixedReversed = [...fixed[r]].reverse();
          const { row, score } = slideRowLeft(reversed, fixedReversed);
          const finalRow = row.reverse();
          newGrid[r] = finalRow;
          totalScore += score;
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] !== finalRow[c]) changed = true;
          }
        }
        return { grid: newGrid, score: totalScore, changed };
      }

      function moveUp() {
        let newGrid = Array(4).fill(null).map(() => Array(4).fill(0));
        let totalScore = 0;
        let changed = false;
        for (let c = 0; c < 4; c++) {
          const col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
          const fixedCol = [fixed[0][c], fixed[1][c], fixed[2][c], fixed[3][c]];
          const { row, score } = slideRowLeft(col, fixedCol);
          for (let r = 0; r < 4; r++) {
            newGrid[r][c] = row[r];
          }
          totalScore += score;
          for (let r = 0; r < 4; r++) {
            if (grid[r][c] !== row[r]) changed = true;
          }
        }
        return { grid: newGrid, score: totalScore, changed };
      }

      function moveDown() {
        let newGrid = Array(4).fill(null).map(() => Array(4).fill(0));
        let totalScore = 0;
        let changed = false;
        for (let c = 0; c < 4; c++) {
          const col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
          const fixedCol = [fixed[3][c], fixed[2][c], fixed[1][c], fixed[0][c]];
          const { row, score } = slideRowLeft(col, fixedCol);
          for (let r = 0; r < 4; r++) {
            newGrid[3 - r][c] = row[r];
          }
          totalScore += score;
          for (let r = 0; r < 4; r++) {
            if (grid[r][c] !== newGrid[r][c]) changed = true;
          }
        }
        return { grid: newGrid, score: totalScore, changed };
      }

      function canMove() {
        const dirs = ['left', 'right', 'up', 'down'];
        for (const dir of dirs) {
          let result;
          switch(dir) {
            case 'left': result = moveLeft(); break;
            case 'right': result = moveRight(); break;
            case 'up': result = moveUp(); break;
            case 'down': result = moveDown(); break;
          }
          if (result.changed) return true;
        }
        return false;
      }

      function checkWin() {
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] === 2048 && !hasWon) {
              hasWon = true;
              sound.playWin();
              if (gameMode === 'challenge') {
                stopTimer();
                const elapsed = Math.round(180 - timeLeft);
                if (elapsed < bestTime) {
                  bestTime = elapsed;
                  localStorage.setItem('2048BestTime', bestTime);
                }
                setTimeout(() => {
                  modalTitle.textContent = '挑战成功！';
                  modalMessage.textContent = `你用时 ${elapsed} 秒合成了 2048！`;
                  finalScoreEl.textContent = `得分: ${score} | 最佳: ${bestTime}秒`;
                  modal.classList.add('active');
                }, 300);
              } else {
                setTimeout(() => {
                  modalTitle.textContent = '恭喜！';
                  modalMessage.textContent = '你成功合成了 2048！继续挑战更高分吧！';
                  finalScoreEl.textContent = score;
                  modal.classList.add('active');
                }, 300);
              }
              return true;
            }
          }
        }
        return false;
      }

      function makeMove(direction) {
        if (isAnimating || activeSkill) return;
        if (gameMode === 'challenge' && timeLeft <= 0) return; // time's up, no more moves

        let result;
        switch(direction) {
          case 'left': result = moveLeft(); break;
          case 'right': result = moveRight(); break;
          case 'up': result = moveUp(); break;
          case 'down': result = moveDown(); break;
          default: return;
        }

        if (!result.changed) {
          sound.playError();
          return;
        }

        sound.playMove();
        if (result.score > 0) {
          // Find the highest merged value to determine pitch
          let maxMerged = 0;
          for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
              if (result.grid[r][c] > grid[r][c] && result.grid[r][c] > maxMerged) {
                maxMerged = result.grid[r][c];
              }
            }
          }
          sound.playMerge(maxMerged > 0 ? maxMerged : result.score);
        }

        saveState();
        grid = result.grid;
        score += result.score;
        scoreEl.textContent = score;

        if (score > bestScore) {
          bestScore = score;
          bestScoreEl.textContent = bestScore;
          localStorage.setItem('2048BestScore', bestScore);
        }

        updateMaxTile();
        updateSkillButtons();
        
        // Check if we need to spawn fixed tiles
        const prevThreshold = Math.floor((score - result.score) / 1000) * 1000;
        const newThreshold = Math.floor(score / 1000) * 1000;
        if (newThreshold > prevThreshold) {
          trySpawnFixedTile();
        }
        
        const newTile = addRandomTile();
        render(newTile);

        if (!canMove()) {
          sound.playLose();
          setTimeout(() => {
            modalTitle.textContent = '游戏结束';
            modalMessage.textContent = '没有可移动的方块了';
            finalScoreEl.textContent = score;
            modal.classList.add('active');
          }, 400);
        } else {
          checkWin();
        }
      }

      function updateMaxTile() {
        let max = 0;
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] > max) max = grid[r][c];
          }
        }
        maxTileEl.textContent = max;
      }

      function render(newTile) {
        board.innerHTML = '';
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const value = grid[r][c];
            const isFixed = fixed[r][c];
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            // Fixed tile style
            if (isFixed && value > 0) {
              tile.classList.add('tile-fixed');
            }
            
            // Skill mode highlighting
            if (activeSkill) {
              if (selectedTiles.length > 0 && selectedTiles[0].r === r && selectedTiles[0].c === c) {
                tile.classList.add('skill-selected');
              } else if (activeSkill === 'move' && selectedTiles.length > 0) {
                // Highlight adjacent empty cells
                const first = selectedTiles[0];
                if (grid[r][c] === 0 && Math.abs(r - first.r) + Math.abs(c - first.c) === 1) {
                  tile.classList.add('skill-target');
                } else if (grid[r][c] === 0) {
                  tile.classList.add('skill-invalid');
                }
              } else if (activeSkill === 'clear' && value > 0) {
                tile.classList.add('skill-selectable');
              } else if (activeSkill === 'swap') {
                tile.classList.add('skill-selectable');
              }
            }
            
            if (value > 0) {
              let className = `tile tile-${value}`;
              if (value > 2048) className = 'tile tile-super';
              tile.className = (tile.className + ' ' + className).trim();
              tile.textContent = value;
              
              if (newTile && newTile.r === r && newTile.c === c) {
                tile.classList.add('new');
              }
            } else {
              tile.className = (tile.className + ' tile-0').trim();
            }

            // Click handler for skills
            tile.addEventListener('click', () => {
              if (activeSkill) {
                executeSkill(r, c);
              }
            });
            
            board.appendChild(tile);
          }
        }
      }

      // Keyboard controls
      document.addEventListener('keydown', (e) => {
        if (modal.classList.contains('active')) {
          if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            newGame();
          }
          return;
        }

        if (activeSkill && e.code === 'Escape') {
          cancelSkill();
          return;
        }

        const key = e.key.toLowerCase();
        switch(key) {
          case 'arrowleft': case 'a':
            e.preventDefault();
            makeMove('left');
            break;
          case 'arrowright': case 'd':
            e.preventDefault();
            makeMove('right');
            break;
          case 'arrowup': case 'w':
            e.preventDefault();
            makeMove('up');
            break;
          case 'arrowdown': case 's':
            e.preventDefault();
            makeMove('down');
            break;
        }
      });

      // Touch / swipe controls
      const swipeArea = document.getElementById('swipeArea');
      let touchStartX = 0;
      let touchStartY = 0;
      let touchStartTime = 0;

      swipeArea.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchStartTime = Date.now();
      }, { passive: true });

      swipeArea.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const dt = Date.now() - touchStartTime;
        
        if (dt > 500) return;
        
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        const minSwipe = 30;
        
        if (absDx < minSwipe && absDy < minSwipe) return;
        
        if (absDx > absDy) {
          makeMove(dx > 0 ? 'right' : 'left');
        } else {
          makeMove(dy > 0 ? 'down' : 'up');
        }
      }, { passive: true });

      // Board swipe for mobile
      let boardTouchStartX = 0;
      let boardTouchStartY = 0;
      let boardTouchStartTime = 0;

      board.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        boardTouchStartX = touch.clientX;
        boardTouchStartY = touch.clientY;
        boardTouchStartTime = Date.now();
      }, { passive: true });

      board.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - boardTouchStartX;
        const dy = touch.clientY - boardTouchStartY;
        const dt = Date.now() - boardTouchStartTime;
        
        if (dt > 500) return;
        
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        const minSwipe = 30;
        
        if (absDx < minSwipe && absDy < minSwipe) return;
        
        if (!activeSkill) {
          if (absDx > absDy) {
            makeMove(dx > 0 ? 'right' : 'left');
          } else {
            makeMove(dy > 0 ? 'down' : 'up');
          }
        }
      }, { passive: true });

      window.newGame = function() {
        modal.classList.remove('active');
        initGrid();
      };

      // Start game
      updateModeButton();
      initGrid();
    })();
  </script>
</body>
</html>
