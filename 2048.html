<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 - Neon Arcade</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%239333ea' rx='20' width='100' height='100'/><text y='.9em' font-size='90' x='50%' text-anchor='middle'>🔢</text></svg>">
  <style>
    /* 2048-specific styles */
    .board-2048 {
      width: 360px;
      height: 360px;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      position: relative;
      border: 2px solid var(--border-color);
      box-shadow: 0 0 30px rgba(147, 51, 234, 0.1);
    }

    .tile {
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .tile::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tile.new {
      animation: tileAppear 0.3s ease;
    }

    .tile.merged {
      animation: tileMerge 0.3s ease;
    }

    @keyframes tileAppear {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes tileMerge {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Tile color scheme - purple neon */
    .tile-0 { background: rgba(17, 16, 26, 0.6); }
    
    .tile-2 { 
      background: linear-gradient(135deg, #2e1065, #3b0764); 
      color: #d8b4fe; 
      font-size: 1.6rem;
      box-shadow: 0 0 10px rgba(147, 51, 234, 0.2);
    }
    .tile-4 { 
      background: linear-gradient(135deg, #3b0764, #581c87); 
      color: #c084fc; 
      font-size: 1.6rem;
      box-shadow: 0 0 12px rgba(147, 51, 234, 0.25);
    }
    .tile-8 { 
      background: linear-gradient(135deg, #581c87, #7c3aed); 
      color: #fff; 
      font-size: 1.6rem;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
    }
    .tile-16 { 
      background: linear-gradient(135deg, #7c3aed, #9333ea); 
      color: #fff; 
      font-size: 1.5rem;
      box-shadow: 0 0 18px rgba(147, 51, 234, 0.35);
    }
    .tile-32 { 
      background: linear-gradient(135deg, #9333ea, #a855f7); 
      color: #fff; 
      font-size: 1.5rem;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
    }
    .tile-64 { 
      background: linear-gradient(135deg, #a855f7, #c084fc); 
      color: #fff; 
      font-size: 1.5rem;
      box-shadow: 0 0 22px rgba(192, 132, 252, 0.45);
    }
    .tile-128 { 
      background: linear-gradient(135deg, #c084fc, #d8b4fe); 
      color: #3b0764; 
      font-size: 1.3rem;
      box-shadow: 0 0 25px rgba(200, 132, 252, 0.5);
      text-shadow: 0 0 5px rgba(59, 7, 100, 0.3);
    }
    .tile-256 { 
      background: linear-gradient(135deg, #d8b4fe, #e9d5ff); 
      color: #581c87; 
      font-size: 1.3rem;
      box-shadow: 0 0 28px rgba(216, 180, 254, 0.55);
      text-shadow: 0 0 5px rgba(88, 28, 135, 0.3);
    }
    .tile-512 { 
      background: linear-gradient(135deg, #e9d5ff, #f3e8ff); 
      color: #7c3aed; 
      font-size: 1.3rem;
      box-shadow: 0 0 30px rgba(233, 213, 255, 0.6);
      text-shadow: 0 0 5px rgba(124, 58, 237, 0.3);
    }
    .tile-1024 { 
      background: linear-gradient(135deg, #f3e8ff, #c084fc); 
      color: #581c87; 
      font-size: 1.1rem;
      box-shadow: 0 0 35px rgba(192, 132, 252, 0.65);
      text-shadow: 0 0 8px rgba(88, 28, 135, 0.4);
    }
    .tile-2048 { 
      background: linear-gradient(135deg, #c084fc, #a855f7, #9333ea); 
      color: #fff; 
      font-size: 1.1rem;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.8), 0 0 60px rgba(147, 51, 234, 0.4);
      animation: tileGlow 2s ease infinite;
    }

    .tile-super { 
      background: linear-gradient(135deg, #ff00ff, #9333ea, #00ffff); 
      background-size: 200% 200%;
      color: #fff; 
      font-size: 1rem;
      box-shadow: 0 0 45px rgba(255, 0, 255, 0.7);
      animation: gradientShift 3s ease infinite;
    }

    @keyframes tileGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.8), 0 0 60px rgba(147, 51, 234, 0.4); }
      50% { box-shadow: 0 0 50px rgba(168, 85, 247, 1), 0 0 80px rgba(147, 51, 234, 0.6); }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Mobile swipe controls */
    .swipe-area {
      display: none;
      margin-top: 20px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      position: relative;
      touch-action: none;
      user-select: none;
    }

    .swipe-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-align: center;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .board-2048 {
        width: 340px;
        height: 340px;
      }
      .tile {
        font-size: 1.4rem;
      }
      .tile-128, .tile-256, .tile-512 { font-size: 1.1rem; }
      .tile-1024, .tile-2048 { font-size: 0.95rem; }
      .tile-super { font-size: 0.85rem; }
      .swipe-area {
        display: block;
      }
    }

    @media (max-width: 400px) {
      .board-2048 {
        width: 300px;
        height: 300px;
      }
      .tile {
        font-size: 1.2rem;
      }
      .tile-128, .tile-256, .tile-512 { font-size: 0.95rem; }
      .tile-1024, .tile-2048 { font-size: 0.85rem; }
      .tile-super { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="page-wrapper">
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="logo">
          <div class="logo-icon">🎮</div>
          <span class="logo-text">NEON ARCADE</span>
        </a>
        <a href="index.html" class="nav-back">
          <span>←</span> 返回大厅
        </a>
      </div>
    </nav>

    <main class="game-page">
      <div class="game-header">
        <h1>🔢 2048</h1>
        <p class="subtitle">滑动合并方块，合成 2048！</p>
      </div>

      <div style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;">
        <button class="btn btn-primary" onclick="newGame()">新游戏</button>
        <button class="btn btn-secondary" onclick="undoMove()">撤销</button>
      </div>

      <div class="score-board">
        <div class="score-box">
          <div class="score-label">得分</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">最高分</div>
          <div class="score-value" id="bestScore">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">最大方块</div>
          <div class="score-value" id="maxTile">0</div>
        </div>
      </div>

      <div class="game-board-container">
        <div class="board-2048" id="board"></div>
      </div>

      <div class="controls-hint">
        使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 滑动方块
      </div>

      <div class="swipe-area" id="swipeArea">
        <div class="swipe-hint">在此区域<br>滑动操作</div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        Neon Arcade - 合并相同数字，策略致胜
      </div>
    </footer>
  </div>

  <!-- Game Over Modal -->
  <div class="overlay" id="gameOverModal">
    <div class="modal">
      <h2 id="modalTitle">游戏结束</h2>
      <p id="modalMessage">没有可移动的方块了</p>
      <div class="modal-score" id="finalScore">0</div>
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="newGame()">再来一局</button>
        <a href="index.html" class="btn btn-secondary">返回大厅</a>
      </div>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script>
    (function() {
      const board = document.getElementById('board');
      const scoreEl = document.getElementById('score');
      const bestScoreEl = document.getElementById('bestScore');
      const maxTileEl = document.getElementById('maxTile');
      const modal = document.getElementById('gameOverModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalMessage = document.getElementById('modalMessage');
      const finalScoreEl = document.getElementById('finalScore');

      let grid = [];
      let score = 0;
      let bestScore = parseInt(localStorage.getItem('2048BestScore') || '0');
      let history = [];
      let hasWon = false;
      let isAnimating = false;

      bestScoreEl.textContent = bestScore;

      function initGrid() {
        grid = Array(4).fill(null).map(() => Array(4).fill(0));
        score = 0;
        hasWon = false;
        history = [];
        scoreEl.textContent = '0';
        updateMaxTile();
        addRandomTile();
        addRandomTile();
        render();
      }

      function addRandomTile() {
        const empty = [];
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] === 0) empty.push({ r, c });
          }
        }
        if (empty.length === 0) return false;
        const { r, c } = empty[Math.floor(Math.random() * empty.length)];
        grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        return { r, c, value: grid[r][c] };
      }

      function saveState() {
        history.push({
          grid: grid.map(row => [...row]),
          score: score
        });
        if (history.length > 10) history.shift();
      }

      function undoMove() {
        if (history.length === 0) return;
        const state = history.pop();
        grid = state.grid;
        score = state.score;
        scoreEl.textContent = score;
        updateMaxTile();
        render();
      }

      window.undoMove = undoMove;

      function slideRowLeft(row) {
        let filtered = row.filter(v => v !== 0);
        for (let i = 0; i < filtered.length - 1; i++) {
          if (filtered[i] === filtered[i + 1]) {
            filtered[i] *= 2;
            score += filtered[i];
            filtered[i + 1] = 0;
          }
        }
        filtered = filtered.filter(v => v !== 0);
        while (filtered.length < 4) filtered.push(0);
        return filtered;
      }

      function moveLeft() {
        const newGrid = grid.map(row => slideRowLeft([...row]));
        return { grid: newGrid, changed: !gridsEqual(grid, newGrid) };
      }

      function moveRight() {
        const newGrid = grid.map(row => {
          const reversed = [...row].reverse();
          const slid = slideRowLeft(reversed);
          return slid.reverse();
        });
        return { grid: newGrid, changed: !gridsEqual(grid, newGrid) };
      }

      function moveUp() {
        const newGrid = Array(4).fill(null).map(() => Array(4).fill(0));
        for (let c = 0; c < 4; c++) {
          const col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
          const slid = slideRowLeft(col);
          for (let r = 0; r < 4; r++) newGrid[r][c] = slid[r];
        }
        return { grid: newGrid, changed: !gridsEqual(grid, newGrid) };
      }

      function moveDown() {
        const newGrid = Array(4).fill(null).map(() => Array(4).fill(0));
        for (let c = 0; c < 4; c++) {
          const col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
          const slid = slideRowLeft(col);
          for (let r = 0; r < 4; r++) newGrid[3 - r][c] = slid[r];
        }
        return { grid: newGrid, changed: !gridsEqual(grid, newGrid) };
      }

      function gridsEqual(a, b) {
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (a[r][c] !== b[r][c]) return false;
          }
        }
        return true;
      }

      function canMove() {
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] === 0) return true;
            if (c < 3 && grid[r][c] === grid[r][c + 1]) return true;
            if (r < 3 && grid[r][c] === grid[r + 1][c]) return true;
          }
        }
        return false;
      }

      function checkWin() {
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] === 2048 && !hasWon) {
              hasWon = true;
              setTimeout(() => {
                modalTitle.textContent = '恭喜！';
                modalMessage.textContent = '你成功合成了 2048！继续挑战更高分吧！';
                finalScoreEl.textContent = score;
                modal.classList.add('active');
              }, 300);
              return true;
            }
          }
        }
        return false;
      }

      function makeMove(direction) {
        if (isAnimating) return;

        let result;
        switch(direction) {
          case 'left': result = moveLeft(); break;
          case 'right': result = moveRight(); break;
          case 'up': result = moveUp(); break;
          case 'down': result = moveDown(); break;
          default: return;
        }

        if (!result.changed) return;

        saveState();
        grid = result.grid;
        scoreEl.textContent = score;

        if (score > bestScore) {
          bestScore = score;
          bestScoreEl.textContent = bestScore;
          localStorage.setItem('2048BestScore', bestScore);
        }

        updateMaxTile();
        
        const newTile = addRandomTile();
        render(newTile);

        if (!canMove()) {
          setTimeout(() => {
            modalTitle.textContent = '游戏结束';
            modalMessage.textContent = '没有可移动的方块了';
            finalScoreEl.textContent = score;
            modal.classList.add('active');
          }, 400);
        } else {
          checkWin();
        }
      }

      function updateMaxTile() {
        let max = 0;
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (grid[r][c] > max) max = grid[r][c];
          }
        }
        maxTileEl.textContent = max;
      }

      function render(newTile) {
        board.innerHTML = '';
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const value = grid[r][c];
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            if (value > 0) {
              let className = `tile tile-${value}`;
              if (value > 2048) className = 'tile tile-super';
              tile.className = className;
              tile.textContent = value;
              
              if (newTile && newTile.r === r && newTile.c === c) {
                tile.classList.add('new');
              }
            } else {
              tile.className = 'tile tile-0';
            }
            
            board.appendChild(tile);
          }
        }
      }

      // Keyboard controls
      document.addEventListener('keydown', (e) => {
        if (modal.classList.contains('active')) {
          if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            newGame();
          }
          return;
        }

        const key = e.key.toLowerCase();
        switch(key) {
          case 'arrowleft': case 'a':
            e.preventDefault();
            makeMove('left');
            break;
          case 'arrowright': case 'd':
            e.preventDefault();
            makeMove('right');
            break;
          case 'arrowup': case 'w':
            e.preventDefault();
            makeMove('up');
            break;
          case 'arrowdown': case 's':
            e.preventDefault();
            makeMove('down');
            break;
        }
      });

      // Touch / swipe controls
      const swipeArea = document.getElementById('swipeArea');
      let touchStartX = 0;
      let touchStartY = 0;
      let touchStartTime = 0;

      swipeArea.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchStartTime = Date.now();
      }, { passive: true });

      swipeArea.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const dt = Date.now() - touchStartTime;
        
        if (dt > 500) return; // Too slow
        
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        const minSwipe = 30;
        
        if (absDx < minSwipe && absDy < minSwipe) return;
        
        if (absDx > absDy) {
          makeMove(dx > 0 ? 'right' : 'left');
        } else {
          makeMove(dy > 0 ? 'down' : 'up');
        }
      }, { passive: true });

      // Also allow swipe on the board itself
      let boardTouchStartX = 0;
      let boardTouchStartY = 0;
      let boardTouchStartTime = 0;

      board.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        boardTouchStartX = touch.clientX;
        boardTouchStartY = touch.clientY;
        boardTouchStartTime = Date.now();
      }, { passive: true });

      board.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - boardTouchStartX;
        const dy = touch.clientY - boardTouchStartY;
        const dt = Date.now() - boardTouchStartTime;
        
        if (dt > 500) return;
        
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        const minSwipe = 30;
        
        if (absDx < minSwipe && absDy < minSwipe) return;
        
        if (absDx > absDy) {
          makeMove(dx > 0 ? 'right' : 'left');
        } else {
          makeMove(dy > 0 ? 'down' : 'up');
        }
      }, { passive: true });

      window.newGame = function() {
        modal.classList.remove('active');
        initGrid();
      };

      // Start game
      initGrid();
    })();
  </script>
</body>
</html>
