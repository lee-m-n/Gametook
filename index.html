<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Arcade - 霓虹游戏厅</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%239333ea' rx='20' width='100' height='100'/><text y='.9em' font-size='90' x='50%' text-anchor='middle'>🎮</text></svg>">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="page-wrapper">
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="logo">
          <div class="logo-icon">🎮</div>
          <span class="logo-text">NEON ARCADE</span>
        </a>
      </div>
    </nav>

    <main>
      <section class="hero">
        <div class="container">
          <h1 class="hero-title animate-fade-in">
            <span class="gradient-text">霓虹游戏厅</span>
          </h1>
          <p class="hero-subtitle animate-fade-in animate-delay-1">
            经典街机游戏，黑紫霓虹风格<br>选择一款游戏，开始你的挑战
          </p>
        </div>
      </section>

      <section class="container">
        <div class="games-grid">
          <!-- Snake Game Card -->
          <a href="snake.html" class="game-card animate-fade-in animate-delay-2">
            <div class="game-icon">🐍</div>
            <h2>贪吃蛇</h2>
            <p>经典街机游戏，控制蛇吃食物变长，
               避免撞墙和撞到自己。看看你能得多少分！</p>
            <span class="play-btn">开始游戏 →</span>
          </a>

          <!-- 2048 Game Card -->
          <a href="2048.html" class="game-card animate-fade-in animate-delay-3">
            <div class="game-icon">🔢</div>
            <h2>2048</h2>
            <p>滑动合并相同数字的方块，
               目标是合成 2048！策略与运气的完美结合。</p>
            <span class="play-btn">开始游戏 →</span>
          </a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        Neon Arcade - 黑紫霓虹游戏厅
      </div>
    </footer>
  </div>

  <script src="js/particles.js"></script>
</body>
</html>
