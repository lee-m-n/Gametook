<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 - Neon Arcade</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%239333ea' rx='20' width='100' height='100'/><text y='.9em' font-size='90' x='50%' text-anchor='middle'>🐍</text></svg>">
  <style>
    /* Snake-specific styles */
    .snake-canvas {
      display: block;
      background: var(--grid-bg);
      border-radius: 12px;
    }

    .snake-grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 12px;
      background-image:
        linear-gradient(rgba(46, 16, 101, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46, 16, 101, 0.3) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .game-board-wrapper {
      position: relative;
      display: inline-block;
    }

    .mobile-controls {
      display: none;
      margin-top: 24px;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      gap: 8px;
      justify-content: center;
    }

    .mobile-controls .dpad-btn {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--purple-300);
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: all 0.15s ease;
      font-family: 'Inter', sans-serif;
    }

    .mobile-controls .dpad-btn:active {
      background: var(--purple-900);
      border-color: var(--purple-500);
      transform: scale(0.95);
    }

    .mobile-controls .dpad-btn:nth-child(2) { grid-column: 2; grid-row: 1; }
    .mobile-controls .dpad-btn:nth-child(4) { grid-column: 1; grid-row: 2; }
    .mobile-controls .dpad-btn:nth-child(5) { grid-column: 2; grid-row: 2; background: var(--bg-card-hover); }
    .mobile-controls .dpad-btn:nth-child(6) { grid-column: 3; grid-row: 2; }
    .mobile-controls .dpad-btn:nth-child(8) { grid-column: 2; grid-row: 3; }

    @media (max-width: 768px) {
      .mobile-controls {
        display: grid;
      }
      .skills-panel {
        flex-direction: column;
        align-items: center;
      }
      .skill-btn {
        width: 200px;
      }
    }

    .speed-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .speed-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .speed-btn:hover {
      border-color: var(--purple-500);
      color: var(--text-primary);
    }

    .speed-btn.active {
      background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
      color: white;
      border-color: var(--purple-500);
      box-shadow: 0 0 15px rgba(147, 51, 234, 0.3);
    }

    /* Skills panel styles */
    .skills-panel {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .skill-btn {
      position: relative;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 140px;
    }

    .skill-btn:hover:not(.disabled) {
      border-color: var(--purple-500);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(147, 51, 234, 0.2);
    }

    .skill-btn.active-skill {
      border-color: #22c55e;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
    }

    .skill-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .skill-btn .skill-icon {
      font-size: 1.2rem;
    }

    .skill-btn .skill-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .skill-btn .skill-name {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .skill-btn .skill-cost {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .skill-btn .skill-key {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--purple-600);
      color: white;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
    }

    .skill-btn .cooldown-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #ef4444, #f87171);
      border-radius: 0 0 0 10px;
      transition: width 0.1s linear;
    }

    .invincible-indicator {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      color: #22c55e;
      font-size: 0.75rem;
      font-weight: 700;
      display: none;
    }

    .invincible-indicator.active {
      display: block;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    .sound-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 100;
      transition: all 0.3s ease;
    }

    .sound-toggle:hover {
      border-color: var(--purple-500);
      transform: scale(1.1);
    }

    .sound-toggle.muted {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="page-wrapper">
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="logo">
          <div class="logo-icon">🎮</div>
          <span class="logo-text">NEON ARCADE</span>
        </a>
        <a href="index.html" class="nav-back">
          <span>←</span> 返回大厅
        </a>
      </div>
    </nav>

    <main class="game-page">
      <div class="game-header">
        <h1>🐍 贪吃蛇</h1>
        <p class="subtitle">控制蛇吃食物，碰到红色方块会失败。使用技能助你生存！</p>
      </div>

      <div class="speed-selector">
        <button class="speed-btn" data-speed="100" data-red="1" data-multiplier="1">简单</button>
        <button class="speed-btn active" data-speed="100" data-red="3" data-multiplier="1.5">普通</button>
        <button class="speed-btn" data-speed="100" data-red="6" data-multiplier="2">中等</button>
        <button class="speed-btn" data-speed="100" data-red="9" data-multiplier="3">困难</button>
      </div>

      <div class="score-board">
        <div class="score-box">
          <div class="score-label">得分</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">最高分</div>
          <div class="score-value" id="highScore">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">长度</div>
          <div class="score-value" id="length">1</div>
        </div>
      </div>

      <div class="skills-panel">
        <button class="skill-btn" id="skillDevour" onclick="useDevour()">
          <span class="skill-key">Q</span>
          <span class="skill-icon">💥</span>
          <div class="skill-info">
            <span class="skill-name">吞噬</span>
            <span class="skill-cost">30 分</span>
          </div>
          <div class="cooldown-overlay" id="devourCooldown" style="width: 0%"></div>
        </button>
        <button class="skill-btn" id="skillInvincible" onclick="useInvincible()">
          <span class="skill-key">E</span>
          <span class="skill-icon">🛡️</span>
          <div class="skill-info">
            <span class="skill-name">无敌</span>
            <span class="skill-cost">50 分</span>
          </div>
          <div class="cooldown-overlay" id="invincibleCooldown" style="width: 0%"></div>
        </button>
      </div>

      <div class="game-board-wrapper">
        <div class="game-board-container">
          <canvas id="snakeCanvas" class="snake-canvas" width="400" height="400"></canvas>
          <div class="snake-grid-overlay"></div>
          <div class="invincible-indicator" id="invincibleIndicator">🛡️ 无敌中</div>
        </div>
      </div>

      <div class="controls-hint">
        使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向
        <br>
        <kbd>Q</kbd> 吞噬(30分)　<kbd>E</kbd> 无敌(50分)　<kbd>空格</kbd> 暂停
      </div>

      <div class="mobile-controls" id="mobileControls">
        <div class="dpad-btn" data-dir="up">▲</div>
        <div class="dpad-btn" data-dir="left">◀</div>
        <div class="dpad-btn" data-dir="center">●</div>
        <div class="dpad-btn" data-dir="right">▶</div>
        <div class="dpad-btn" data-dir="down">▼</div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        Neon Arcade - 按空格键暂停/继续
      </div>
    </footer>
  </div>

  <!-- Game Over Modal -->
  <div class="overlay" id="gameOverModal">
    <div class="modal">
      <h2>游戏结束</h2>
      <p>碰到红色方块了！小心躲避它</p>
      <div class="modal-score" id="finalScore">0</div>
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="restartGame()">再来一局</button>
        <a href="index.html" class="btn btn-secondary">返回大厅</a>
      </div>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script>
    (function() {
      const canvas = document.getElementById('snakeCanvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const highScoreEl = document.getElementById('highScore');
      const lengthEl = document.getElementById('length');
      const finalScoreEl = document.getElementById('finalScore');
      const modal = document.getElementById('gameOverModal');
      const speedBtns = document.querySelectorAll('.speed-btn');
      const skillDevourBtn = document.getElementById('skillDevour');
      const skillInvincibleBtn = document.getElementById('skillInvincible');
      const devourCooldownEl = document.getElementById('devourCooldown');
      const invincibleCooldownEl = document.getElementById('invincibleCooldown');
      const invincibleIndicator = document.getElementById('invincibleIndicator');

      // Audio system
      let audioCtx = null;
      let soundEnabled = true;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playTone(freq, duration, type = 'sine', volume = 0.15) {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      }

      function playEat() {
        initAudio();
        playTone(523.25, 0.08, 'sine', 0.12);
        setTimeout(() => playTone(659.25, 0.08, 'sine', 0.12), 50);
        setTimeout(() => playTone(783.99, 0.1, 'sine', 0.12), 100);
      }

      function playGameOver() {
        initAudio();
        playTone(261.63, 0.2, 'sawtooth', 0.15);
        setTimeout(() => playTone(196.00, 0.2, 'sawtooth', 0.15), 150);
        setTimeout(() => playTone(146.83, 0.3, 'sawtooth', 0.15), 300);
      }

      function playDevour() {
        initAudio();
        // Noise burst for explosion effect
        if (soundEnabled && audioCtx) {
          const bufferSize = audioCtx.sampleRate * 0.15;
          const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
          }
          const noise = audioCtx.createBufferSource();
          noise.buffer = buffer;
          const noiseGain = audioCtx.createGain();
          noiseGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
          noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
          noise.connect(noiseGain);
          noiseGain.connect(audioCtx.destination);
          noise.start();
        }
        playTone(100, 0.2, 'square', 0.2);
      }

      function playInvincibleStart() {
        initAudio();
        playTone(440, 0.12, 'sine', 0.12);
        setTimeout(() => playTone(554, 0.12, 'sine', 0.12), 100);
        setTimeout(() => playTone(659, 0.15, 'sine', 0.12), 200);
        setTimeout(() => playTone(880, 0.3, 'sine', 0.1), 350);
      }

      function playInvincibleEnd() {
        initAudio();
        playTone(880, 0.1, 'sine', 0.1);
        setTimeout(() => playTone(659, 0.15, 'sine', 0.1), 100);
      }

      function playError() {
        initAudio();
        playTone(150, 0.15, 'square', 0.12);
        setTimeout(() => playTone(120, 0.15, 'square', 0.12), 80);
      }

      window.toggleSound = function() {
        soundEnabled = !soundEnabled;
        const btn = document.getElementById('soundToggle');
        btn.textContent = soundEnabled ? '🔊' : '🔇';
        btn.classList.toggle('muted', !soundEnabled);
        if (soundEnabled) initAudio();
      };

      // Game settings
      const GRID_SIZE = 20;
      const TILE_COUNT = 20; // 400 / 20
      let gameSpeed = 100;
      let redBlockCount = 3; // 当前难度的红块数量
      let scoreMultiplier = 1.5; // 当前分数倍率（普通难度）
      let gameLoop = null;
      let isPaused = false;
      let isGameOver = false;

      // Snake state
      let snake = [{ x: 10, y: 10 }];
      let direction = { x: 0, y: 0 };
      let nextDirection = { x: 0, y: 0 };
      let food = { x: 15, y: 15 };
      let redBlocks = [];  // 红色危险方块数组
      let score = 0;
      let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
      let particles = [];

      highScoreEl.textContent = highScore;

      // Skill settings
      const DEVOUR_COST = 30;
      const INVINCIBLE_COST = 50;
      const INVINCIBLE_DURATION = 5000; // 5秒
      const INVINCIBLE_COOLDOWN_MOVES = 30; // 移动30步后才能再次使用

      // Skill state
      let invincibleActive = false;
      let invincibleEndTime = 0;
      let invincibleCooldownMoves = 0; // 剩余冷却步数
      let movesSinceLastInvincible = 0; // 上次使用后的移动步数
      let devourCooldown = false;

      // Color palette for snake
      const SNAKE_HEAD = '#c084fc';
      const SNAKE_BODY = '#a855f7';
      const SNAKE_TAIL = '#9333ea';
      const FOOD_COLOR = '#22c55e';
      const FOOD_GLOW = '#4ade80';
      const RED_BLOCK_COLOR = '#ef4444';
      const RED_BLOCK_GLOW = '#f87171';

      // Speed selector
      speedBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (isGameOver) return;
          speedBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          gameSpeed = parseInt(btn.dataset.speed);
          redBlockCount = parseInt(btn.dataset.red);
          scoreMultiplier = parseFloat(btn.dataset.multiplier) || 1;
          if (gameLoop) {
            clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
          }
        });
      });

      // Update skill button UI
      function updateSkillUI() {
        // Devour button
        if (score < DEVOUR_COST || devourCooldown || isGameOver || isPaused) {
          skillDevourBtn.classList.add('disabled');
        } else {
          skillDevourBtn.classList.remove('disabled');
        }
        devourCooldownEl.style.width = devourCooldown ? '100%' : '0%';

        // Invincible button
        if (score < INVINCIBLE_COST || invincibleCooldownMoves > 0 || invincibleActive || isGameOver || isPaused) {
          skillInvincibleBtn.classList.add('disabled');
        } else {
          skillInvincibleBtn.classList.remove('disabled');
        }
        if (invincibleCooldownMoves > 0) {
          const pct = (invincibleCooldownMoves / INVINCIBLE_COOLDOWN_MOVES) * 100;
          invincibleCooldownEl.style.width = pct + '%';
        } else {
          invincibleCooldownEl.style.width = '0%';
        }

        // Invincible indicator
        if (invincibleActive) {
          invincibleIndicator.classList.add('active');
          const remaining = Math.ceil((invincibleEndTime - Date.now()) / 1000);
          invincibleIndicator.textContent = `🛡️ 无敌中 ${remaining}s`;
          skillInvincibleBtn.classList.add('active-skill');
        } else {
          invincibleIndicator.classList.remove('active');
          skillInvincibleBtn.classList.remove('active-skill');
        }
      }

      // Use Devour skill: clear red blocks in 3x3 area around snake head
      window.useDevour = function() {
        if (isGameOver || isPaused || score < DEVOUR_COST || devourCooldown) return;

        score -= DEVOUR_COST;
        scoreEl.textContent = score;
        devourCooldown = true;
        playDevour();

        const head = snake[0];
        const minX = Math.max(0, head.x - 1);
        const maxX = Math.min(TILE_COUNT - 1, head.x + 1);
        const minY = Math.max(0, head.y - 1);
        const maxY = Math.min(TILE_COUNT - 1, head.y + 1);

        let cleared = 0;
        redBlocks = redBlocks.filter(block => {
          if (block.x >= minX && block.x <= maxX && block.y >= minY && block.y <= maxY) {
            cleared++;
            createParticles(block.x, block.y, '#ef4444');
            return false;
          }
          return true;
        });

        // Visual effect: flash the area
        flashArea(minX, minY, maxX - minX + 1, maxY - minY + 1);

        // Cooldown for 1 second
        setTimeout(() => {
          devourCooldown = false;
          updateSkillUI();
        }, 1000);

        updateSkillUI();
        draw();
      };

      // Use Invincible skill: immune to red blocks for 5 seconds, cooldown 30 moves
      window.useInvincible = function() {
        if (isGameOver || isPaused || score < INVINCIBLE_COST || invincibleCooldownMoves > 0 || invincibleActive) return;

        score -= INVINCIBLE_COST;
        scoreEl.textContent = score;
        invincibleActive = true;
        invincibleEndTime = Date.now() + INVINCIBLE_DURATION;
        movesSinceLastInvincible = 0;
        invincibleCooldownMoves = INVINCIBLE_COOLDOWN_MOVES;
        playInvincibleStart();

        updateSkillUI();
        draw();

        // Check invincible timer
        const invincibleTimer = setInterval(() => {
          if (!invincibleActive || isGameOver) {
            clearInterval(invincibleTimer);
            return;
          }
          if (Date.now() >= invincibleEndTime) {
            invincibleActive = false;
            playInvincibleEnd();
            updateSkillUI();
            draw();
            clearInterval(invincibleTimer);
          }
          updateSkillUI();
        }, 100);
      };

      // Flash area effect for devour
      function flashArea(x, y, w, h) {
        const flashEl = document.createElement('div');
        flashEl.style.position = 'absolute';
        flashEl.style.left = (x * GRID_SIZE) + 'px';
        flashEl.style.top = (y * GRID_SIZE) + 'px';
        flashEl.style.width = (w * GRID_SIZE) + 'px';
        flashEl.style.height = (h * GRID_SIZE) + 'px';
        flashEl.style.background = 'rgba(239, 68, 68, 0.4)';
        flashEl.style.borderRadius = '4px';
        flashEl.style.pointerEvents = 'none';
        flashEl.style.transition = 'opacity 0.3s ease';
        document.querySelector('.game-board-container').appendChild(flashEl);
        requestAnimationFrame(() => {
          flashEl.style.opacity = '0';
        });
        setTimeout(() => flashEl.remove(), 350);
      }

      // Input handling
      document.addEventListener('keydown', (e) => {
        if (isGameOver) {
          if (e.code === 'Space' || e.code === 'Enter') {
            restartGame();
          }
          return;
        }

        if (e.code === 'Space') {
          e.preventDefault();
          isPaused = !isPaused;
          updateSkillUI();
          return;
        }

        const key = e.key.toLowerCase();

        // Skill keys
        if (key === 'q') {
          e.preventDefault();
          if (score < DEVOUR_COST || devourCooldown) {
            playError();
          }
          useDevour();
          return;
        }
        if (key === 'e') {
          e.preventDefault();
          if (score < INVINCIBLE_COST || invincibleCooldownMoves > 0 || invincibleActive) {
            playError();
          }
          useInvincible();
          return;
        }

        const newDir = { ...nextDirection };

        switch(key) {
          case 'arrowup': case 'w':
            if (direction.y !== 1) newDir.x = 0; newDir.y = -1;
            break;
          case 'arrowdown': case 's':
            if (direction.y !== -1) newDir.x = 0; newDir.y = 1;
            break;
          case 'arrowleft': case 'a':
            if (direction.x !== 1) newDir.x = -1; newDir.y = 0;
            break;
          case 'arrowright': case 'd':
            if (direction.x !== -1) newDir.x = 1; newDir.y = 0;
            break;
        }

        // Prevent 180 turns
        if (snake.length > 1) {
          const head = snake[0];
          const neck = snake[1];
          if (head.x + newDir.x === neck.x && head.y + newDir.y === neck.y) {
            return;
          }
        }

        nextDirection = newDir;
        e.preventDefault();
      });

      // Mobile controls
      document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
        const dir = btn.dataset.dir;
        if (dir === 'center') return;
        
        btn.addEventListener('click', () => {
          if (isGameOver) {
            restartGame();
            return;
          }
          
          const dirs = {
            up: { x: 0, y: -1 },
            down: { x: 0, y: 1 },
            left: { x: -1, y: 0 },
            right: { x: 1, y: 0 }
          };
          
          const newDir = dirs[dir];
          if (!newDir) return;
          
          // Prevent 180 turns
          if (snake.length > 1) {
            const head = snake[0];
            const neck = snake[1];
            if (head.x + newDir.x === neck.x && head.y + newDir.y === neck.y) {
              return;
            }
          }
          
          // Prevent reversing current direction
          if (direction.x !== -newDir.x || direction.y !== -newDir.y) {
            nextDirection = { ...newDir };
          }
        });
      });

      function isNearSnake(x, y, distance) {
        for (const segment of snake) {
          if (Math.abs(segment.x - x) <= distance && Math.abs(segment.y - y) <= distance) {
            return true;
          }
        }
        return false;
      }

      function spawnRedBlocks(count) {
        // 红色方块只在边缘3格外刷新（x: 3-16, y: 3-16）
        const MIN = 3;
        const MAX = TILE_COUNT - 4; // 16
        redBlocks = [];
        for (let i = 0; i < count; i++) {
          let block;
          let attempts = 0;
          do {
            block = {
              x: Math.floor(Math.random() * (MAX - MIN + 1)) + MIN,
              y: Math.floor(Math.random() * (MAX - MIN + 1)) + MIN
            };
            attempts++;
          } while (
            attempts < 50 && (
              isNearSnake(block.x, block.y, 5) ||
              snake.some(s => s.x === block.x && s.y === block.y) ||
              (food.x === block.x && food.y === block.y) ||
              redBlocks.some(b => b.x === block.x && b.y === block.y)
            )
          );
          redBlocks.push(block);
        }
      }

      function spawnFood() {
        // 食物也只刷新在边缘3格外（x: 3-16, y: 3-16）
        const MIN = 3;
        const MAX = TILE_COUNT - 4; // 16
        do {
          food = {
            x: Math.floor(Math.random() * (MAX - MIN + 1)) + MIN,
            y: Math.floor(Math.random() * (MAX - MIN + 1)) + MIN
          };
        } while (
          isNearSnake(food.x, food.y, 5) ||
          snake.some(s => s.x === food.x && s.y === food.y) ||
          redBlocks.some(b => b.x === food.x && b.y === food.y)
        );
      }

      function createParticles(x, y, colorOverride) {
        const colors = colorOverride ? [colorOverride] : ['#c084fc', '#a855f7', '#22c55e', '#4ade80'];
        for (let i = 0; i < 8; i++) {
          particles.push({
            x: x * GRID_SIZE + GRID_SIZE / 2,
            y: y * GRID_SIZE + GRID_SIZE / 2,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            life: 1,
            size: Math.random() * 3 + 1,
            color: colors[Math.floor(Math.random() * colors.length)]
          });
        }
      }

      function updateParticles() {
        particles = particles.filter(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.05;
          p.size *= 0.95;
          return p.life > 0;
        });
      }

      function drawParticles() {
        particles.forEach(p => {
          ctx.globalAlpha = p.life;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      function drawRoundedRect(x, y, w, h, r, color) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw food with glow
        const fx = food.x * GRID_SIZE;
        const fy = food.y * GRID_SIZE;
        
        ctx.shadowColor = FOOD_GLOW;
        ctx.shadowBlur = 15;
        drawRoundedRect(fx + 2, fy + 2, GRID_SIZE - 4, GRID_SIZE - 4, 4, FOOD_COLOR);
        ctx.shadowBlur = 0;

        // Draw red blocks (danger blocks) with glow
        for (const block of redBlocks) {
          const rx = block.x * GRID_SIZE;
          const ry = block.y * GRID_SIZE;
          
          ctx.shadowColor = RED_BLOCK_GLOW;
          ctx.shadowBlur = 20;
          drawRoundedRect(rx + 1, ry + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4, RED_BLOCK_COLOR);
          ctx.shadowBlur = 0;
          
          // Red block skull icon
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 12px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('☠', rx + GRID_SIZE / 2, ry + GRID_SIZE / 2 + 1);
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
        }

        // Draw snake
        snake.forEach((segment, i) => {
          const sx = segment.x * GRID_SIZE;
          const sy = segment.y * GRID_SIZE;
          const isHead = i === 0;
          const progress = i / snake.length;
          
          let color;
          if (isHead) {
            color = SNAKE_HEAD;
          } else {
            // Gradient from body to tail
            const r = Math.round(147 + (168 - 147) * (1 - progress));
            const g = Math.round(51 + (85 - 51) * (1 - progress));
            const b = Math.round(234 + (247 - 234) * (1 - progress));
            color = `rgb(${r}, ${g}, ${b})`;
          }

          const padding = isHead ? 1 : 2;
          const size = GRID_SIZE - padding * 2;
          const radius = isHead ? 6 : 4;

          if (isHead) {
            ctx.shadowColor = invincibleActive ? '#22c55e' : SNAKE_BODY;
            ctx.shadowBlur = invincibleActive ? 20 : 10;
          }

          drawRoundedRect(sx + padding, sy + padding, size, size, radius, color);
          ctx.shadowBlur = 0;

          // Eyes for head
          if (isHead) {
            ctx.fillStyle = invincibleActive ? '#22c55e' : '#fff';
            const eyeSize = invincibleActive ? 4 : 3;
            const eyeOffset = 4;
            
            if (direction.x === 1 || direction.x === 0 && direction.y === 0) {
              ctx.beginPath(); ctx.arc(sx + 14, sy + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
              ctx.beginPath(); ctx.arc(sx + 14, sy + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
            } else if (direction.x === -1) {
              ctx.beginPath(); ctx.arc(sx + 6, sy + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
              ctx.beginPath(); ctx.arc(sx + 6, sy + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
            } else if (direction.y === -1) {
              ctx.beginPath(); ctx.arc(sx + 6, sy + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
              ctx.beginPath(); ctx.arc(sx + 14, sy + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
            } else if (direction.y === 1) {
              ctx.beginPath(); ctx.arc(sx + 6, sy + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
              ctx.beginPath(); ctx.arc(sx + 14, sy + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
            }
          }
        });

        // Draw particles
        updateParticles();
        drawParticles();

        // Pause overlay
        if (isPaused && !isGameOver) {
          ctx.fillStyle = 'rgba(5, 5, 8, 0.7)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.font = '700 28px Orbitron, sans-serif';
          ctx.fillStyle = '#c084fc';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
        }
      }

      function gameStep() {
        if (isPaused || isGameOver) return;

        direction = { ...nextDirection };
        if (direction.x === 0 && direction.y === 0) return;

        const head = { ...snake[0] };
        head.x += direction.x;
        head.y += direction.y;

        // 穿墙：从对面出来
        if (head.x < 0) head.x = TILE_COUNT - 1;
        if (head.x >= TILE_COUNT) head.x = 0;
        if (head.y < 0) head.y = TILE_COUNT - 1;
        if (head.y >= TILE_COUNT) head.y = 0;

        // 碰到任意红色方块 -> 游戏失败 (unless invincible)
        if (!invincibleActive && redBlocks.some(b => b.x === head.x && b.y === head.y)) {
          gameOver();
          return;
        }

        snake.unshift(head);

        // Track moves for invincible cooldown
        if (invincibleCooldownMoves > 0) {
          invincibleCooldownMoves--;
          updateSkillUI();
        }

        // Eat food
        if (head.x === food.x && head.y === food.y) {
          const earned = Math.round(10 * scoreMultiplier);
          score += earned;
          scoreEl.textContent = score;
          lengthEl.textContent = snake.length;
          createParticles(food.x, food.y);
          playEat();
          spawnFood();
          spawnRedBlocks(redBlockCount); // 按当前难度刷新红色方块位置

          if (score > highScore) {
            highScore = score;
            highScoreEl.textContent = highScore;
            localStorage.setItem('snakeHighScore', highScore);
          }
        } else {
          snake.pop();
        }

        updateSkillUI();
        draw();
      }

      function gameOver() {
        isGameOver = true;
        clearInterval(gameLoop);
        playGameOver();
        finalScoreEl.textContent = score;
        modal.classList.add('active');
      }

      window.restartGame = function() {
        snake = [{ x: 10, y: 10 }];
        direction = { x: 0, y: 0 };
        nextDirection = { x: 0, y: 0 };
        score = 0;
        scoreEl.textContent = '0';
        lengthEl.textContent = '1';
        isGameOver = false;
        isPaused = false;
        particles = [];
        invincibleActive = false;
        invincibleEndTime = 0;
        invincibleCooldownMoves = 0;
        movesSinceLastInvincible = 0;
        devourCooldown = false;
        scoreMultiplier = 1.5; // reset to normal difficulty multiplier
        spawnFood();
        spawnRedBlocks(redBlockCount);
        modal.classList.remove('active');
        updateSkillUI();
        draw();
        gameLoop = setInterval(gameStep, gameSpeed);
      };

      // Start game
      spawnFood();
      spawnRedBlocks(redBlockCount);
      updateSkillUI();
      draw();
      gameLoop = setInterval(gameStep, gameSpeed);

      // Handle canvas resize for mobile
      function resizeCanvas() {
        if (window.innerWidth < 480) {
          canvas.width = 320;
          canvas.height = 320;
        } else {
          canvas.width = 400;
          canvas.height = 400;
        }
        draw();
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
    })();
  </script>
  <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

</body>
</html>
